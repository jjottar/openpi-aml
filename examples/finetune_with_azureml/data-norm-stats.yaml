$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
command: 
 GIT_LFS_SKIP_SMUDGE=1 uv pip install -e . && 
 uv run scripts/compute_norm_stats.py
 --config-name pi0_fast_custom
 --output-path-str ${{outputs.ASSETS_BASE}}
environment: azureml:<env_name>:<env_version>
outputs:
  ASSETS_BASE:
    type: uri_folder
    path: azureml://datastores/<ds_name>/paths/pi0_fast_libero/physical-intelligence/libero/
  HF_LEROBOT_HOME:
    type: uri_folder
    path: azureml://datastores/<ds_name>/paths/pi0_fast_libero/
environment_variables:
  HF_LEROBOT_HOME: ${{outputs.HF_LEROBOT_HOME}}
display_name: pi0_compute_norm_stats
experiment_name: compute_norm_stats
compute: <cpu_vm_name>
code: ../..